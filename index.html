<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק תדריך משלחת</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.2/umd/Recharts.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');
        body { 
            font-family: 'Heebo', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; 
            overflow-x: hidden;
        }
        .animate-slide { animation: slide-up 0.4s ease-out both; }
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-bounce-in { animation: bounce-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes bounce-in { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        // ---------------------------------------------------------
        // 1. הגדרת רכיבים וספריות
        // ---------------------------------------------------------
        const { useState, useEffect, useMemo } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, LabelList 
        } = window.Recharts;
        
        // שליפת אייקונים בצורה בטוחה
        const { 
            Users, Trophy, ChevronRight, Send, BarChart2, Award, Clock, CheckCircle2, 
            XCircle, Settings, Save, Plus, Trash2, LogOut, MessageSquare 
        } = window.lucideReact;

        // ---------------------------------------------------------
        // 2. אתחול Firebase
        // ---------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyD6YyQzuKAFfujfE5y-gyMsvja4yZ_nlS4",
            authDomain: "delegationquizv.firebaseapp.com",
            projectId: "delegationquizv",
            storageBucket: "delegationquizv.firebasestorage.app",
            messagingSenderId: "80236670656",
            appId: "1:80236670656:web:632e8773af3bff79cc4725"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'delegation-quiz-v5';

        const DEFAULT_QUESTIONS = [
            { id: 1, type: 'wordcloud', question: "מהם הדברים שיש לוודא טרם הגעה לתדריך למשלחת?", description: "כתבו מילה או שתיים שחשוב לבדוק מראש" },
            { id: 2, type: 'multiple', question: "היכן ניתן לראות את רמת האיום בכל מדינה?", options: [{ id: 'a', text: "א. באתר השגרירות" }, { id: 'b', text: "ב. מידע לא נגיש" }, { id: 'c', text: "ג. באתר המל\"ל", correct: true }, { id: 'd', text: "ד. בתקשורת" }] },
            { id: 3, type: 'multiple_select', question: "איזה משפט הכי נכון?", hint: "יש יותר מתשובה אחת נכונה", options: [{ id: 'a', text: "א. תדריך אחיד" }, { id: 'b', text: "ב. להפחיד" }, { id: 'c', text: "ג. מדויק למשלחת", correct: true }, { id: 'd', text: "ד. מערב משתתפים", correct: true }] },
            { id: 4, type: 'multiple', question: "האם הורים נחשבים מלווים?", options: [{ id: 'a', text: "א. כן, כמבוגר אחראי" }, { id: 'b', text: "ב. לא, למעט חריגים", correct: true }, { id: 'c', text: "ג. כן, באישור" }, { id: 'd', text: "ד. לא, לא היו בתדריך" }] },
            { id: 5, type: 'multiple', question: "מה המפתח של מלווים למשלחת עצמאית?", options: [{ id: 'a', text: "א. מנהל + 1 לכל 15", correct: true }, { id: 'b', text: "ב. מנהל + 1 לכל 10" }, { id: 'c', text: "ג. מנהל + 1 לכל 20" }, { id: 'd', text: "ד. 1 לכל 15 ללא מנהל" }] }
        ];

        // ---------------------------------------------------------
        // 3. אפליקציה ראשית
        // ---------------------------------------------------------
        function App() {
            const [user, setUser] = useState(null);
            const [playerName, setPlayerName] = useState('');
            const [currentStep, setCurrentStep] = useState('login');
            const [questionIndex, setQuestionIndex] = useState(0);
            const [selectedOptions, setSelectedOptions] = useState([]);
            const [wordCloudInput, setWordCloudInput] = useState('');
            const [startTime, setStartTime] = useState(null);
            const [hasAnswered, setHasAnswered] = useState(false);
            const [lastQuestionResult, setLastQuestionResult] = useState(null);
            const [players, setPlayers] = useState([]);
            const [answers, setAnswers] = useState([]);
            const [dynamicQuestions, setDynamicQuestions] = useState(DEFAULT_QUESTIONS);
            const [adminPass, setAdminPass] = useState('');

            // Auth Effect
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (!u) await auth.signInAnonymously();
                    setUser(u);
                });
                return unsub;
            }, []);

            // Data Sync Effect
            useEffect(() => {
                if (!user) return;
                const baseRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const unsubQ = baseRef.collection('config').doc('questions').onSnapshot(s => {
                    if (s.exists && s.data().list) setDynamicQuestions(s.data().list);
                });
                const unsubP = baseRef.collection('players').onSnapshot(s => {
                    setPlayers(s.docs.map(d => ({id: d.id, ...d.data()})));
                });
                const unsubA = baseRef.collection('answers').onSnapshot(s => {
                    setAnswers(s.docs.map(d => ({id: d.id, ...d.data()})));
                });

                return () => { unsubQ(); unsubP(); unsubA(); };
            }, [user]);

            // Actions
            const handleJoin = async () => {
                if (!playerName.trim() || !user) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('players').doc(user.uid).set({
                    name: String(playerName), score: 0, totalTime: 0, lastActive: Date.now()
                });
                setCurrentStep('lobby');
            };

            const submitAnswer = async () => {
                if (hasAnswered || !user) return;
                const timeTaken = (Date.now() - (startTime || Date.now())) / 1000;
                const q = dynamicQuestions[questionIndex];
                let isCorrect = false;

                if (q.type === 'wordcloud') isCorrect = true;
                else if (q.type === 'multiple') isCorrect = selectedOptions[0] === q.options.find(o => o.correct)?.id;
                else if (q.type === 'multiple_select') {
                    const correctIds = q.options.filter(o => o.correct).map(o => o.id).sort().join(',');
                    isCorrect = correctIds === [...selectedOptions].sort().join(',');
                }

                let points = 0;
                if (isCorrect && q.type !== 'wordcloud') {
                    points = Math.max(100 - Math.floor(timeTaken), 50);
                    const p = players.find(p => p.id === user.uid);
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('players').doc(user.uid).update({
                        score: (p?.score || 0) + points,
                        totalTime: (p?.totalTime || 0) + timeTaken
                    });
                }

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('answers').add({
                    playerId: user.uid, playerName, questionId: q.id, 
                    answer: q.type === 'wordcloud' ? String(wordCloudInput) : selectedOptions,
                    isCorrect, timeTaken, timestamp: Date.now()
                });

                setLastQuestionResult({ isCorrect, points, type: q.type });
                setHasAnswered(true);
                setCurrentStep('feedback');
            };

            const nextQuestion = () => {
                if (questionIndex < dynamicQuestions.length - 1) {
                    setQuestionIndex(i => i + 1);
                    setSelectedOptions([]);
                    setWordCloudInput('');
                    setStartTime(Date.now());
                    setHasAnswered(false);
                    setCurrentStep('quiz');
                } else {
                    setCurrentStep('results');
                }
            };

            // Memoized Stats
            const leaderboard = useMemo(() => [...players].sort((a,b) => (b.score||0)-(a.score||0) || (a.totalTime||0)-(b.totalTime||0)).slice(0, 5), [players]);

            const currentWordCloudData = useMemo(() => {
                const qId = dynamicQuestions[questionIndex]?.id;
                const wordFreq = {};
                answers.filter(a => a.questionId === qId).forEach(ans => {
                    if (typeof ans.answer === 'string') {
                        ans.answer.split(/[\s,.;]+/).filter(w => w.length > 1).forEach(w => {
                            const clean = w.trim();
                            if (clean) wordFreq[clean] = (wordFreq[clean] || 0) + 1;
                        });
                    }
                });
                return Object.entries(wordFreq).map(([text, value]) => ({ text, value })).sort((a, b) => b.value - a.value);
            }, [answers, dynamicQuestions, questionIndex]);

            const getStats = (qId) => {
                const q = dynamicQuestions.find(qi => qi.id === qId);
                if (!q || q.type === 'wordcloud') return [];
                const qAns = answers.filter(a => a.questionId === qId);
                return q.options.map(opt => ({
                    name: opt.text.length > 12 ? opt.text.substring(0,12)+'...' : opt.text,
                    fullName: opt.text,
                    count: qAns.filter(a => Array.isArray(a.answer) && a.answer.includes(opt.id)).length,
                    isCorrect: opt.correct
                }));
            };

            const saveQuestions = async (newList) => {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('questions').set({ list: newList });
                    alert("נשמר בהצלחה!");
                } catch (e) { alert("שגיאה בשמירה ב-Firebase"); }
            };

            // ---------------------------------------------------------
            // 4. Render
            // ---------------------------------------------------------
            return (
                <div className="min-h-screen flex flex-col bg-slate-50" dir="rtl">
                    {/* Header */}
                    <nav className="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-xl text-white"><Award size={24} /></div>
                            <h1 className="text-xl font-black text-slate-800">משחק תדריך משלחת</h1>
                        </div>
                        {playerName && currentStep !== 'admin_panel' && (
                            <div className="bg-blue-50 text-blue-700 px-4 py-1.5 rounded-full text-sm font-bold border border-blue-100 flex items-center gap-2">
                                <div className="w-2 bg-green-500 h-2 rounded-full animate-pulse"></div>{playerName}
                            </div>
                        )}
                    </nav>

                    <main className="max-w-4xl mx-auto p-4 md:p-8 w-full flex-1">
                        
                        {/* STEP: LOGIN */}
                        {currentStep === 'login' && (
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl border text-center mt-10 animate-slide">
                                <Users className="text-blue-600 mx-auto mb-6" size={60} />
                                <h2 className="text-4xl font-black mb-3">ברוכים הבאים</h2>
                                <p className="text-slate-500 mb-10 text-lg">הכנה למשלחות – בואו נראה מה אתם יודעים!</p>
                                <input type="text" className="w-full max-w-sm p-5 rounded-2xl bg-slate-50 border-2 text-center text-xl font-bold mb-4 outline-none focus:border-blue-500 shadow-inner" placeholder="הקלידו שם..." value={playerName} onChange={e => setPlayerName(e.target.value)} />
                                <button onClick={handleJoin} className="w-full max-w-sm bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl transition-all active:scale-95 text-lg block mx-auto">הצטרפות למשחק</button>
                            </div>
                        )}

                        {/* STEP: LOBBY */}
                        {currentStep === 'lobby' && (
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-xl border text-center mt-10 animate-slide">
                                <h2 className="text-3xl font-black mb-8 text-slate-800">המשתתפים בחדר ({players.length})</h2>
                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-10">
                                    {players.map(p => (
                                        <div key={p.id} className="bg-slate-50 p-5 rounded-2xl border border-slate-100 font-bold truncate">
                                            {p.name}
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => { setQuestionIndex(0); setStartTime(Date.now()); setCurrentStep('quiz'); setHasAnswered(false); }} className="bg-green-600 text-white font-black px-16 py-5 rounded-2xl text-xl shadow-lg hover:bg-green-700 transition-all">התחל חידון!</button>
                            </div>
                        )}

                        {/* STEP: QUIZ */}
                        {currentStep === 'quiz' && dynamicQuestions[questionIndex] && (
                            <div className="space-y-6 animate-slide">
                                <div className="bg-white p-8 rounded-[2rem] shadow-lg border border-slate-100">
                                    <span className="text-blue-600 font-black text-sm block mb-2">שאלה {questionIndex + 1} מתוך {dynamicQuestions.length}</span>
                                    <h2 className="text-2xl md:text-3xl font-black text-slate-800 leading-tight">{dynamicQuestions[questionIndex].question}</h2>
                                    {dynamicQuestions[questionIndex].hint && <div className="mt-3 text-indigo-600 font-bold bg-indigo-50 py-2 px-4 rounded-xl inline-flex items-center gap-2"><CheckCircle2 size={18}/>{dynamicQuestions[questionIndex].hint}</div>}
                                </div>
                                <div className="grid gap-4">
                                    {dynamicQuestions[questionIndex].type === 'wordcloud' ? (
                                        <div className="bg-white p-10 rounded-[2rem] shadow-lg border text-center">
                                            <p className="text-slate-500 mb-6">{dynamicQuestions[questionIndex].description}</p>
                                            <div className="flex gap-3">
                                                <input type="text" className="flex-1 p-5 rounded-2xl bg-slate-50 border-2 text-xl font-bold outline-none focus:border-blue-500" value={wordCloudInput} onChange={e => setWordCloudInput(e.target.value)} />
                                                <button onClick={submitAnswer} className="bg-blue-600 text-white px-8 rounded-2xl flex items-center justify-center"><Send size={28}/></button>
                                            </div>
                                        </div>
                                    ) : (
                                        dynamicQuestions[questionIndex].options.map(opt => (
                                            <button key={opt.id} onClick={() => dynamicQuestions[questionIndex].type === 'multiple' ? setSelectedOptions([opt.id]) : setSelectedOptions(p => p.includes(opt.id) ? p.filter(x => x !== opt.id) : [...p, opt.id])} className={`p-6 rounded-2xl border-2 text-right font-bold transition-all flex items-center justify-between ${selectedOptions.includes(opt.id) ? 'border-blue-500 bg-blue-50' : 'bg-white border-slate-100 hover:border-blue-300'}`}>
                                                <span className="text-lg md:text-xl">{opt.text}</span>
                                                <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ${selectedOptions.includes(opt.id) ? 'bg-blue-500 border-blue-500 text-white' : 'border-slate-300'}`}>{selectedOptions.includes(opt.id) && "✓"}</div>
                                            </button>
                                        ))
                                    )}
                                </div>
                                {dynamicQuestions[questionIndex].type !== 'wordcloud' && <button onClick={submitAnswer} disabled={selectedOptions.length === 0} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg hover:bg-blue-700 transition-all active:scale-95 disabled:opacity-50">אישור ובדיקה</button>}
                            </div>
                        )}

                        {/* STEP: FEEDBACK */}
                        {currentStep === 'feedback' && lastQuestionResult && (
                            <div className="text-center mt-20 animate-bounce-in bg-white p-12 rounded-[3rem] shadow-xl border">
                                <div className={`w-32 h-32 rounded-full mx-auto mb-8 flex items-center justify-center shadow-xl ${lastQuestionResult.isCorrect ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                                    {lastQuestionResult.type === 'wordcloud' ? <MessageSquare size={60}/> : (lastQuestionResult.isCorrect ? <CheckCircle2 size={60}/> : <XCircle size={60}/>)}
                                </div>
                                <h2 className={`text-5xl font-black mb-4 ${lastQuestionResult.isCorrect ? 'text-green-600' : 'text-red-600'}`}>{lastQuestionResult.type === 'wordcloud' ? "תודה על השיתוף!" : (lastQuestionResult.isCorrect ? "כל הכבוד!" : "טעות...")}</h2>
                                {lastQuestionResult.type !== 'wordcloud' && <div className="bg-slate-50 p-6 rounded-3xl border inline-block px-12"><p className="text-sm text-slate-400 uppercase font-bold mb-1">ניקוד שנוסף</p><p className="text-5xl font-black text-blue-600">+{lastQuestionResult.points}</p></div>}
                                <div className="mt-12"><button onClick={() => setCurrentStep('leaderboard')} className="bg-slate-900 text-white font-black py-4 px-16 rounded-2xl shadow-xl hover:bg-slate-800 transition-all active:scale-95">לתוצאות המשלחת</button></div>
                            </div>
                        )}

                        {/* STEP: LEADERBOARD & STATS */}
                        {currentStep === 'leaderboard' && (
                            <div className="space-y-8 animate-slide">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100">
                                    <div className="flex items-center justify-between mb-8">
                                        <div className="flex items-center gap-4"><Trophy className="text-amber-500" size={32}/><h2 className="text-2xl font-black">5 המובילים</h2></div>
                                        <button onClick={nextQuestion} className="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black flex items-center gap-2 hover:bg-slate-800 transition-all">לשאלה הבאה <ChevronRight size={20}/></button>
                                    </div>
                                    <div className="space-y-3">
                                        {leaderboard.map((p, idx) => (
                                            <div key={p.id} className={`flex items-center justify-between p-5 rounded-2xl border ${p.id === user?.uid ? 'bg-blue-50 border-blue-200 shadow-sm' : 'bg-slate-50 border-slate-100'}`}>
                                                <span className="font-black text-xl text-slate-700">{idx+1}. {p.name}</span>
                                                <div className="text-left"><div className="text-[10px] text-slate-400 font-bold uppercase">ניקוד</div><div className="text-2xl font-black text-blue-600">{p.score}</div></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                                    <h3 className="text-2xl font-black text-slate-800 mb-10 flex items-center gap-2"><BarChart2 className="text-blue-500" /> פילוח תשובות המשלחת</h3>
                                    {dynamicQuestions[questionIndex].type === 'wordcloud' ? (
                                        <div className="flex flex-wrap gap-4 justify-center items-center p-10 bg-slate-50 rounded-[2rem] min-h-[300px] border-2 border-dashed border-slate-200">
                                            {currentWordCloudData.length > 0 ? currentWordCloudData.map((w, i) => <span key={i} style={{ fontSize: `${Math.min(1.2 + w.value * 0.7, 4)}rem`, opacity: Math.min(0.4 + w.value * 0.2, 1) }} className="font-black text-blue-600 px-2">{w.text}</span>) : <p className="text-slate-400 font-bold">מחכים לתשובות...</p>}
                                        </div>
                                    ) : (
                                        <div className="h-[400px] w-full mt-4">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <BarChart data={getStats(dynamicQuestions[questionIndex].id)} margin={{ bottom: 100 }}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="name" interval={0} angle={-45} textAnchor="end" height={100} tick={{fontSize: 12, fontWeight: 'bold'}} />
                                                    <YAxis hide />
                                                    <Tooltip content={({ active, payload }) => active && payload?.[0] && (
                                                        <div className="bg-slate-900 text-white p-4 shadow-2xl rounded-2xl text-right max-w-xs" dir="rtl">
                                                            <p className="font-bold text-sm">{payload[0].payload.fullName}</p>
                                                            <p className="text-blue-300 font-black">{payload[0].value} עונים</p>
                                                        </div>
                                                    )} />
                                                    <Bar dataKey="count" radius={[10, 10, 0, 0]} barSize={50}>
                                                        {getStats(dynamicQuestions[questionIndex].id).map((entry, index) => <Cell key={index} fill={entry.isCorrect ? '#10b981' : '#cbd5e1'} />)}
                                                        <LabelList dataKey="count" position="top" style={{fill: '#3b82f6', fontWeight: '900'}} />
                                                    </Bar>
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* STEP: FINAL RESULTS */}
                        {currentStep === 'results' && (
                            <div className="text-center mt-10 animate-slide">
                                <Trophy size={100} className="text-amber-500 mx-auto mb-6 p-4 bg-amber-50 rounded-full shadow-xl" />
                                <h2 className="text-5xl font-black mb-8 text-slate-800">החידון הסתיים!</h2>
                                <div className="bg-white p-8 rounded-[3rem] shadow-2xl border max-w-2xl mx-auto mb-10">
                                    {leaderboard.map((p, idx) => (
                                        <div key={p.id} className={`flex justify-between p-6 mb-4 rounded-3xl transition-all ${idx === 0 ? 'bg-blue-600 text-white scale-105 shadow-xl' : 'bg-slate-50'}`}>
                                            <div className="flex items-center gap-4 text-right">
                                                <span className="text-3xl">{idx === 0 ? '🏆' : idx === 1 ? '🥈' : '✨'}</span>
                                                <div className="font-black text-2xl">{p.name}</div>
                                            </div>
                                            <div className="text-4xl font-black">{p.score}</div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => window.location.reload()} className="bg-slate-900 text-white font-black py-6 px-20 rounded-2xl text-xl shadow-2xl hover:bg-slate-800 transition-all">משחק חדש</button>
                            </div>
                        )}

                        {/* STEP: ADMIN LOGIN */}
                        {currentStep === 'admin_login' && (
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl border text-center max-w-sm mx-auto mt-20 animate-slide">
                                <Settings className="mx-auto mb-6 text-slate-400" size={48} />
                                <h2 className="text-2xl font-black mb-6">כניסת מנהל</h2>
                                <input type="password" placeholder="סיסמה..." className="w-full p-4 rounded-xl border-2 mb-4 text-center font-bold outline-none focus:border-blue-500" value={adminPass} onChange={e => setAdminPass(e.target.value)} onKeyDown={e => e.key === 'Enter' && adminPass === '12345' && setCurrentStep('admin_panel')} autoFocus />
                                <button onClick={() => adminPass === '12345' ? setCurrentStep('admin_panel') : alert("סיסמה שגויה")} className="w-full bg-slate-900 text-white p-4 rounded-xl font-bold hover:bg-slate-800">כניסה</button>
                            </div>
                        )}

                        {/* STEP: ADMIN PANEL */}
                        {currentStep === 'admin_panel' && (
                            <div className="space-y-6 animate-slide">
                                <div className="flex justify-between items-center bg-white p-6 rounded-3xl shadow-sm border sticky top-20 z-40">
                                    <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3"><Settings size={30} /> ניהול שאלות</h2>
                                    <div className="flex gap-2">
                                        <button onClick={() => saveQuestions(dynamicQuestions)} className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-blue-700 transition-all shadow-md"><Save size={18}/> שמור הכל</button>
                                        <button onClick={() => setCurrentStep('login')} className="bg-slate-100 text-slate-600 px-6 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-200"><LogOut size={18}/> יציאה</button>
                                    </div>
                                </div>
                                {dynamicQuestions.map((q, qIdx) => (
                                    <div key={q.id} className="bg-white p-8 rounded-[2rem] shadow-lg border-2 border-slate-50 space-y-4">
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1 space-y-4">
                                                <div className="flex items-center gap-3"><label className="font-black text-slate-400 text-sm">שאלה {qIdx + 1} ({q.type})</label></div>
                                                <textarea className="w-full p-4 bg-slate-50 rounded-xl font-bold text-lg outline-none focus:bg-white focus:ring-2 focus:ring-blue-100 transition-all" value={q.question} onChange={e => { const n = [...dynamicQuestions]; n[qIdx].question = e.target.value; setDynamicQuestions(n); }} />
                                                {q.type !== 'wordcloud' && (
                                                    <div className="space-y-2 mt-4">
                                                        <label className="block font-bold text-slate-400 text-sm">אפשרויות ותשובה נכונה:</label>
                                                        {q.options.map((opt, oIdx) => (
                                                            <div key={opt.id} className="flex gap-2 items-center">
                                                                <input type="text" className="flex-1 p-3 bg-slate-50 rounded-lg outline-none focus:bg-white" value={opt.text} onChange={e => { const n = [...dynamicQuestions]; n[qIdx].options[oIdx].text = e.target.value; setDynamicQuestions(n); }} />
                                                                <button onClick={() => { 
                                                                    const n = [...dynamicQuestions]; 
                                                                    if(q.type === 'multiple') n[qIdx].options.forEach(o => o.correct = false); 
                                                                    n[qIdx].options[oIdx].correct = !n[qIdx].options[oIdx].correct; 
                                                                    setDynamicQuestions(n); 
                                                                }} className={`px-4 py-2 rounded-lg font-bold transition-all ${opt.correct ? 'bg-green-600 text-white shadow-lg shadow-green-100' : 'bg-slate-100 text-slate-400'}`}>{opt.correct ? 'נכון' : 'לא'}</button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                            <button onClick={() => setDynamicQuestions(dynamicQuestions.filter((_, i) => i !== qIdx))} className="text-red-400 p-2 hover:bg-red-50 rounded-lg transition-colors"><Trash2 size={20}/></button>
                                        </div>
                                    </div>
                                ))}
                                <button onClick={() => setDynamicQuestions([...dynamicQuestions, { id: Date.now(), type: 'multiple', question: 'שאלה חדשה', options: [{id: 'a', text: 'אופציה 1', correct: true}, {id: 'b', text: 'אופציה 2', correct: false}, {id: 'c', text: 'אופציה 3', correct: false}] }])} className="w-full py-6 border-4 border-dashed rounded-3xl text-slate-400 font-black flex items-center justify-center gap-3 hover:bg-white hover:border-blue-200 hover:text-blue-400 transition-all"><Plus /> הוסף שאלה למאגר</button>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="py-8 text-center bg-white border-t mt-10">
                        <div className="max-w-4xl mx-auto px-8 flex justify-between items-center text-slate-300 font-bold text-sm">
                            <span>משחק תדריך משלחת 2026</span>
                            <button onClick={() => setCurrentStep('admin_login')} className="hover:text-blue-500 flex items-center gap-1 opacity-20 hover:opacity-100 transition-all"><Settings size={14}/> ניהול שאלות</button>
                        </div>
                    </footer>
                </div>
            );
        }

        // Render with safety check
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
