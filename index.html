<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק תדריך משלחת</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <script src="https://unpkg.com/recharts@2.12.2/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Heebo', sans-serif; background-color: #f8fafc; margin: 0; }
        .animate-slide { animation: slide-up 0.4s ease-out both; }
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-bounce-in { animation: bounce-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes bounce-in { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // פונקציה שעוטפת הכל כדי לוודא ששום דבר לא רץ לפני שהספריות מוכנות
        const initGame = () => {
            const { useState, useEffect, useMemo } = React;
            
            // הגנה על האייקונים והגרפים - אם הם לא נטענו, נשים אובייקט ריק כדי למנוע קריסה
            const Lucide = window.lucideReact || {};
            const Recharts = window.Recharts || {};

            const { Users, Trophy, ChevronRight, Send, BarChart2, Award, CheckCircle2, XCircle, Settings, Save, Plus, Trash2, LogOut, MessageSquare } = Lucide;
            const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, LabelList } = Recharts;

            const firebaseConfig = {
                apiKey: "AIzaSyD6YyQzuKAFfujfE5y-gyMsvja4yZ_nlS4",
                authDomain: "delegationquizv.firebaseapp.com",
                projectId: "delegationquizv",
                storageBucket: "delegationquizv.firebasestorage.app",
                messagingSenderId: "80236670656",
                appId: "1:80236670656:web:632e8773af3bff79cc4725"
            };

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            const appId = 'delegation-quiz-v5';

            const DEFAULT_QUESTIONS = [
                { id: 1, type: 'wordcloud', question: "מהם הדברים שיש לוודא טרם הגעה לתדריך למשלחת?", description: "כתבו מילה או שתיים שחשוב לבדוק מראש" },
                { id: 2, type: 'multiple', question: "היכן ניתן לראות את רמת האיום בכל מדינה?", options: [{ id: 'a', text: "א. באתר השגרירות" }, { id: 'b', text: "ב. זה לא מידע נגיש, יש לשאול את מודיעין היחידה" }, { id: 'c', text: "ג. באתר המל\"ל", correct: true }, { id: 'd', text: "ד. בכלי התקשורת ביחס למצב המדיני" }] },
                { id: 3, type: 'multiple_select', question: "איזה משפט הכי נכון?", hint: "יש יותר מתשובה אחת נכונה", options: [{ id: 'a', text: "א. תדריך טוב יכול לעבור לכל משלחת אותו הדבר" }, { id: 'b', text: "ב. תדריך טוב צריך להפחיד את הנוסעים" }, { id: 'c', text: "ג. תדריך טוב צריך להיות מדויק למשלחת הספציפית", correct: true }, { id: 'd', text: "ד. תדריך טוב מערב את המשתתפים", correct: true }] },
                { id: 4, type: 'multiple', question: "האם הורים נחשבים מלווים?", options: [{ id: 'a', text: "א. כן, כמבוגר אחראי" }, { id: 'b', text: "ב. לא, למעט מקרים חריגים", correct: true }, { id: 'c', text: "ג. כן, באישור הנהלה" }, { id: 'd', text: "ד. לא, לא היו בתדריך" }] },
                { id: 5, type: 'multiple', question: "מה המפתח של מלווים למשלחת עצמאית?", options: [{ id: 'a', text: "א. מנהל + 1 לכל 15", correct: true }, { id: 'b', text: "ב. מנהל + 1 לכל 10" }, { id: 'c', text: "ג. מנהל + 1 לכל 20" }, { id: 'd', text: "ד. 1 לכל 15 ללא מנהל" }] }
            ];

            function App() {
                const [user, setUser] = useState(null);
                const [playerName, setPlayerName] = useState('');
                const [currentStep, setCurrentStep] = useState('login');
                const [questionIndex, setQuestionIndex] = useState(0);
                const [selectedOptions, setSelectedOptions] = useState([]);
                const [wordCloudInput, setWordCloudInput] = useState('');
                const [startTime, setStartTime] = useState(null);
                const [hasAnswered, setHasAnswered] = useState(false);
                const [lastResult, setLastResult] = useState(null);
                const [players, setPlayers] = useState([]);
                const [answers, setAnswers] = useState([]);
                const [dynamicQuestions, setDynamicQuestions] = useState(DEFAULT_QUESTIONS);
                const [adminPass, setAdminPass] = useState('');

                useEffect(() => {
                    const unsubAuth = auth.onAuthStateChanged(async (u) => {
                        if (!u) await auth.signInAnonymously();
                        setUser(u);
                    });
                    return unsubAuth;
                }, []);

                useEffect(() => {
                    if (!user) return;
                    const path = db.collection('artifacts').doc(appId).collection('public').doc('data');
                    const unsubQ = path.collection('config').doc('questions').onSnapshot(s => {
                        if (s.exists && s.data().list) setDynamicQuestions(s.data().list);
                    });
                    const unsubP = path.collection('players').onSnapshot(s => setPlayers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    const unsubA = path.collection('answers').onSnapshot(s => setAnswers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    return () => { unsubQ(); unsubP(); unsubA(); };
                }, [user]);

                const handleJoin = async () => {
                    if (!playerName.trim() || !user) return;
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('players').doc(user.uid).set({
                        name: String(playerName), score: 0, totalTime: 0, lastActive: Date.now()
                    });
                    setCurrentStep('lobby');
                };

                const submitAnswer = async () => {
                    if (hasAnswered || !user) return;
                    const timeTaken = (Date.now() - (startTime || Date.now())) / 1000;
                    const q = dynamicQuestions[questionIndex];
                    let isCorrect = false;

                    if (q.type === 'wordcloud') isCorrect = true;
                    else if (q.type === 'multiple') isCorrect = selectedOptions[0] === q.options.find(o => o.correct)?.id;
                    else if (q.type === 'multiple_select') {
                        const correctIds = q.options.filter(o => o.correct).map(o => o.id).sort().join(',');
                        isCorrect = correctIds === [...selectedOptions].sort().join(',');
                    }

                    let points = 0;
                    if (isCorrect && q.type !== 'wordcloud') {
                        points = Math.max(100 - Math.floor(timeTaken), 50);
                        const p = players.find(p => p.id === user.uid);
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('players').doc(user.uid).update({
                            score: (p?.score || 0) + points, totalTime: (p?.totalTime || 0) + timeTaken
                        });
                    }

                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('answers').add({
                        playerId: user.uid, playerName, questionId: q.id, answer: q.type === 'wordcloud' ? String(wordCloudInput) : selectedOptions,
                        isCorrect, timeTaken, timestamp: Date.now()
                    });

                    setLastResult({ isCorrect, points, type: q.type });
                    setHasAnswered(true);
                    setCurrentStep('feedback');
                };

                const leaderboard = useMemo(() => [...players].sort((a,b) => (b.score||0)-(a.score||0)).slice(0, 5), [players]);

                const currentWordCloudData = useMemo(() => {
                    const qId = dynamicQuestions[questionIndex]?.id;
                    const wordFreq = {};
                    answers.filter(a => a.questionId === qId).forEach(ans => {
                        if (typeof ans.answer === 'string') {
                            ans.answer.split(/[\s,.;]+/).filter(w => w.length > 1).forEach(w => {
                                const clean = w.trim();
                                if (clean) wordFreq[clean] = (wordFreq[clean] || 0) + 1;
                            });
                        }
                    });
                    return Object.entries(wordFreq).map(([text, value]) => ({ text, value })).sort((a, b) => b.value - a.value);
                }, [answers, dynamicQuestions, questionIndex]);

                const getStats = (qId) => {
                    const q = dynamicQuestions.find(qi => qi.id === qId);
                    if (!q || q.type === 'wordcloud') return [];
                    const qAns = answers.filter(a => a.questionId === qId);
                    return q.options.map(opt => ({
                        name: opt.text.length > 12 ? opt.text.substring(0,12)+'...' : opt.text,
                        fullName: opt.text,
                        count: qAns.filter(a => Array.isArray(a.answer) && a.answer.includes(opt.id)).length,
                        isCorrect: opt.correct
                    }));
                };

                const saveQuestions = async (newList) => {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('questions').set({ list: newList });
                        alert("השינויים נשמרו בהצלחה!");
                    } catch (e) { alert("שגיאה בשמירה"); }
                };

                return (
                    <div className="min-h-screen flex flex-col items-center p-4 md:p-8" dir="rtl">
                        <header className="w-full max-w-4xl flex justify-between items-center mb-8 bg-white p-5 rounded-2xl shadow-sm border">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-xl text-white">{Award ? <Award size={24} /> : '🏆'}</div>
                                <h1 className="text-xl font-black">משחק תדריך משלחת</h1>
                            </div>
                            {playerName && <div className="bg-blue-50 text-blue-700 px-4 py-2 rounded-full font-bold text-sm border border-blue-100">{playerName}</div>}
                        </header>

                        <main className="w-full max-w-2xl">
                            {currentStep === 'login' && (
                                <div className="bg-white p-10 rounded-[2.5rem] shadow-xl border text-center animate-slide">
                                    {Users && <Users size={64} className="mx-auto text-blue-500 mb-6" />}
                                    <h2 className="text-3xl font-black mb-2">ברוכים הבאים</h2>
                                    <p className="text-slate-500 mb-8">הזינו את שמכם כדי להצטרף לחידון</p>
                                    <input type="text" className="w-full p-5 rounded-2xl bg-slate-50 border-2 mb-4 text-center text-xl font-bold outline-none focus:border-blue-500" placeholder="מה השם שלך?" value={playerName} onChange={e => setPlayerName(e.target.value)} />
                                    <button onClick={handleJoin} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg">הצטרפות למשחק</button>
                                </div>
                            )}

                            {currentStep === 'lobby' && (
                                <div className="bg-white p-10 rounded-[2.5rem] shadow-xl border text-center animate-slide">
                                    <h2 className="text-2xl font-black mb-8">המשתתפים בלובי ({players.length})</h2>
                                    <div className="grid grid-cols-2 gap-3 mb-10">
                                        {players.map(p => <div key={p.id} className="p-4 bg-slate-50 rounded-xl font-bold border truncate">{p.name}</div>)}
                                    </div>
                                    <button onClick={() => { setQuestionIndex(0); setStartTime(Date.now()); setCurrentStep('quiz'); setHasAnswered(false); }} className="bg-green-600 text-white px-12 py-5 rounded-2xl font-black text-xl shadow-lg">התחל חידון!</button>
                                </div>
                            )}

                            {currentStep === 'quiz' && dynamicQuestions[questionIndex] && (
                                <div className="space-y-6 animate-slide">
                                    <div className="bg-white p-8 rounded-[2rem] shadow-lg border">
                                        <h2 className="text-2xl md:text-3xl font-black leading-tight">{dynamicQuestions[questionIndex].question}</h2>
                                    </div>
                                    <div className="grid gap-3">
                                        {dynamicQuestions[questionIndex].type === 'wordcloud' ? (
                                            <div className="flex gap-2 bg-white p-6 rounded-[2rem] border-2">
                                                <input type="text" className="flex-1 p-4 rounded-xl bg-slate-50 border text-xl font-bold outline-none" value={wordCloudInput} onChange={e => setWordCloudInput(e.target.value)} placeholder="הקלידו תשובה..." />
                                                <button onClick={submitAnswer} className="bg-blue-600 text-white px-6 rounded-xl flex items-center justify-center">{Send && <Send />}</button>
                                            </div>
                                        ) : (
                                            dynamicQuestions[questionIndex].options.map(opt => (
                                                <button key={opt.id} onClick={() => dynamicQuestions[questionIndex].type === 'multiple' ? setSelectedOptions([opt.id]) : setSelectedOptions(prev => prev.includes(opt.id) ? prev.filter(x => x !== opt.id) : [...prev, opt.id])} className={`p-6 rounded-2xl border-2 text-right font-bold transition-all ${selectedOptions.includes(opt.id) ? 'border-blue-500 bg-blue-50' : 'bg-white border-slate-100 hover:border-slate-300'}`}>{opt.text}</button>
                                            ))
                                        )}
                                    </div>
                                    {dynamicQuestions[questionIndex].type !== 'wordcloud' && <button onClick={submitAnswer} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg">אישור</button>}
                                </div>
                            )}

                            {currentStep === 'feedback' && (
                                <div className="text-center mt-12 animate-bounce-in bg-white p-12 rounded-[3rem] shadow-xl border">
                                    <div className={`mx-auto w-24 h-24 rounded-full flex items-center justify-center mb-6 ${lastResult?.isCorrect ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                                        {lastResult?.type === 'wordcloud' ? <MessageSquare size={48}/> : (lastResult?.isCorrect ? <CheckCircle2 size={48}/> : <XCircle size={48}/>)}
                                    </div>
                                    <h2 className="text-5xl font-black mb-4">{lastResult?.type === 'wordcloud' ? "תודה על השיתוף!" : (lastResult?.isCorrect ? "כל הכבוד!" : "טעות...")}</h2>
                                    {lastResult?.type !== 'wordcloud' && <p className="text-xl text-slate-500 mb-10">צברת {lastResult?.points || 0} נקודות</p>}
                                    <button onClick={() => setCurrentStep('leaderboard')} className="bg-slate-900 text-white py-5 px-16 rounded-2xl text-xl font-bold">לתוצאות</button>
                                </div>
                            )}

                            {currentStep === 'leaderboard' && (
                                <div className="space-y-8 animate-slide">
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl border">
                                        <div className="flex items-center justify-between mb-8">
                                            <h2 className="text-2xl font-black flex items-center gap-2">{BarChart2 && <BarChart2 className="text-blue-600" />} טבלת מובילים</h2>
                                            <button onClick={() => { if (questionIndex < dynamicQuestions.length - 1) { setQuestionIndex(q => q + 1); setSelectedOptions([]); setHasAnswered(false); setStartTime(Date.now()); setWordCloudInput(''); setCurrentStep('quiz'); } else setCurrentStep('results'); }} className="bg-slate-900 text-white py-3 px-6 rounded-xl font-bold">לשאלה הבאה</button>
                                        </div>
                                        <div className="space-y-3">
                                            {leaderboard.map((p, i) => (
                                                <div key={p.id} className={`flex justify-between p-5 rounded-2xl font-bold border ${p.id === user.uid ? 'bg-blue-50 border-blue-200' : 'bg-slate-50'}`}>
                                                    <span>{i+1}. {p.name}</span>
                                                    <span className="text-blue-600">{p.score} נק'</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border">
                                        <h3 className="text-xl font-black mb-6">פילוח תשובות המשלחת</h3>
                                        {dynamicQuestions[questionIndex].type === 'wordcloud' ? (
                                            <div className="flex flex-wrap gap-3 justify-center items-center p-8 bg-slate-50 rounded-2xl">
                                                {currentWordCloudData.map((w, i) => <span key={i} style={{ fontSize: `${1 + w.value * 0.5}rem` }} className="font-black text-blue-600 px-2">{w.text}</span>)}
                                            </div>
                                        ) : (
                                            <div className="h-[300px] w-full">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <BarChart data={getStats(dynamicQuestions[questionIndex].id)}>
                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                                        <XAxis dataKey="name" height={80} tick={{fontSize: 10}} angle={-45} textAnchor="end" />
                                                        <YAxis hide />
                                                        <Tooltip />
                                                        <Bar dataKey="count" radius={[5, 5, 0, 0]} barSize={40}>
                                                            {getStats(dynamicQuestions[questionIndex].id).map((entry, index) => <Cell key={index} fill={entry.isCorrect ? '#10b981' : '#cbd5e1'} />)}
                                                        </Bar>
                                                    </BarChart>
                                                </ResponsiveContainer>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {currentStep === 'results' && (
                                <div className="text-center mt-10 animate-slide">
                                    {Trophy && <Trophy size={100} className="text-amber-500 mx-auto mb-6" />}
                                    <h2 className="text-5xl font-black mb-12">החידון הסתיים!</h2>
                                    <button onClick={() => window.location.reload()} className="bg-slate-900 text-white py-6 px-20 rounded-2xl text-xl font-black shadow-2xl">משחק חדש</button>
                                </div>
                            )}

                            {currentStep === 'admin_login' && (
                                <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl border text-center max-w-sm mx-auto mt-20">
                                    <Settings className="mx-auto mb-6 text-slate-400" size={48} />
                                    <h2 className="text-2xl font-black mb-6">כניסת מנהל</h2>
                                    <input type="password" placeholder="סיסמה..." className="w-full p-4 rounded-xl border-2 mb-4 text-center font-bold" value={adminPass} onChange={e => setAdminPass(e.target.value)} onKeyDown={e => e.key === 'Enter' && adminPass === '12345' && setCurrentStep('admin_panel')} autoFocus />
                                    <button onClick={() => adminPass === '12345' ? setCurrentStep('admin_panel') : alert("טעות")} className="w-full bg-slate-900 text-white p-4 rounded-xl font-bold">כניסה</button>
                                </div>
                            )}

                            {currentStep === 'admin_panel' && (
                                <div className="space-y-6 animate-slide">
                                    <div className="flex justify-between items-center bg-white p-6 rounded-3xl shadow-sm border">
                                        <h2 className="text-3xl font-black flex items-center gap-3"><Settings size={30} /> ניהול שאלות</h2>
                                        <div className="flex gap-2">
                                            <button onClick={() => saveQuestions(dynamicQuestions)} className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2"><Save size={18}/> שמור</button>
                                            <button onClick={() => setCurrentStep('login')} className="bg-slate-100 text-slate-600 px-6 py-2 rounded-xl font-bold"><LogOut size={18}/> יציאה</button>
                                        </div>
                                    </div>
                                    {dynamicQuestions.map((q, qIdx) => (
                                        <div key={q.id} className="bg-white p-6 rounded-[2rem] shadow-lg border space-y-4">
                                            <textarea className="w-full p-4 bg-slate-50 rounded-xl font-bold text-lg" value={q.question} onChange={e => { const n = [...dynamicQuestions]; n[qIdx].question = e.target.value; setDynamicQuestions(n); }} />
                                            {q.type !== 'wordcloud' && q.options.map((opt, oIdx) => (
                                                <div key={opt.id} className="flex gap-2">
                                                    <input type="text" className="flex-1 p-3 bg-slate-50 rounded-lg" value={opt.text} onChange={e => { const n = [...dynamicQuestions]; n[qIdx].options[oIdx].text = e.target.value; setDynamicQuestions(n); }} />
                                                    <button onClick={() => { const n = [...dynamicQuestions]; if(q.type === 'multiple') n[qIdx].options.forEach(o => o.correct = false); n[qIdx].options[oIdx].correct = !n[qIdx].options[oIdx].correct; setDynamicQuestions(n); }} className={`px-4 py-2 rounded-lg font-bold ${opt.correct ? 'bg-green-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{opt.correct ? 'נכון' : 'לא'}</button>
                                                </div>
                                            ))}
                                            <button onClick={() => setDynamicQuestions(dynamicQuestions.filter((_, i) => i !== qIdx))} className="text-red-400 flex items-center gap-1"><Trash2 size={16}/> מחק שאלה</button>
                                        </div>
                                    ))}
                                    <button onClick={() => setDynamicQuestions([...dynamicQuestions, { id: Date.now(), type: 'multiple', question: 'שאלה חדשה', options: [{id: 'a', text: 'תשובה 1', correct: true}, {id: 'b', text: 'תשובה 2', correct: false}] }])} className="w-full py-6 border-4 border-dashed rounded-3xl text-slate-400 font-black">+ הוסף שאלה</button>
                                </div>
                            )}
                        </main>

                        <footer className="py-8 text-center mt-10">
                            <button onClick={() => setCurrentStep('admin_login')} className="text-slate-300 hover:text-blue-500 flex items-center gap-1 mx-auto text-xs opacity-50"><Settings size={12}/> ניהול מערכת</button>
                        </footer>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };

        // הפעלה בטוחה
        window.onload = initGame;
    </script>
</body>
</html>
