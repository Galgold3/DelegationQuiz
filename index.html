<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק תדריך משלחת - גרסה סופית</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #f8fafc; margin: 0; direction: rtl; }
        .animate-slide { animation: slide-up 0.4s ease-out both; }
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-pop { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .timer-bar { transition: width 1s linear; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyD6YyQzuKAFfujfE5y-gyMsvja4yZ_nlS4",
            authDomain: "delegationquizv.firebaseapp.com",
            projectId: "delegationquizv",
            storageBucket: "delegationquizv.firebasestorage.app",
            messagingSenderId: "80236670656",
            appId: "1:80236670656:web:632e8773af3bff79cc4725"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'delegation-quiz-v5';

        const DEFAULT_QUESTIONS = [
            { 
                id: 1, 
                type: 'wordcloud', 
                question: "מהם הדברים שיש לוודא טרם הגעה לתדריך למשלחת?", 
                description: "כתבו מילה או שתיים שחשוב לבדוק מראש",
                summary: "הכנה מוקדמת היא הבסיס לביטחון המשלחת ולניהול נכון של התדריך."
            },
            { 
                id: 2, 
                type: 'multiple', 
                question: "היכן ניתן לראות את רמת האיום בכל מדינה?", 
                options: [
                    { id: 'a', text: "א. באתר השגרירות" },
                    { id: 'b', text: "ב. זה לא מידע נגיש, יש לשאול את מודיעין היחידה" },
                    { id: 'c', text: "ג. באתר המל\"ל", correct: true },
                    { id: 'd', text: "ד. בכלי התקשורת ביחס למצב המדיני" }
                ],
                summary: "אתר המטה לביטחון לאומי (המל\"ל) הוא המקור הרשמי והמוסמך ביותר להנחיות ביטחון למטיילים בחו\"ל."
            },
            { 
                id: 3, 
                type: 'multiple_select', 
                question: "איזה משפט הכי נכון?", 
                hint: "יש יותר מתשובה אחת נכונה",
                options: [
                    { id: 'a', text: "א. תדריך טוב יכול לעבור לכל משלחת אותו הדבר" },
                    { id: 'b', text: "ב. תדריך טוב צריך להפחיד את הנוסעים לגבי מה עלול לקרות" },
                    { id: 'c', text: "ג. תדריך טוב צריך להיות מדויק למשלחת הספציפית", correct: true },
                    { id: 'd', text: "ד. תדריך טוב מערב את המשתתפים בעזרת שאלות ומתודות", correct: true }
                ],
                summary: "אפקטיביות של תדריך נמדדת ביכולת שלו להיות רלוונטי לקבוצה וליצור אצלם קשב אקטיבי."
            },
            { 
                id: 4, 
                type: 'multiple', 
                question: "האם הורים נחשבים מלווים?", 
                options: [
                    { id: 'a', text: "א. כן, הורה יכול להיחשב כחבר משלחת כאשר הוא משמש כמבוגר אחראי במסגרת המשלחת." },
                    { id: 'b', text: "ב. לא, הורה אינו נכלל ברשימת חברי המשלחת, למעט מקרים חריגים בהם הדבר מאושר (כגון משלחות לפולין).", correct: true },
                    { id: 'c', text: "ג. כן, הורה יכול להיחשב כחבר משלחת בכפוף לאישור הנהלת בית הספר." },
                    { id: 'd', text: "ד. לא, הורה אינו נכלל כחבר משלחת מאחר שלא השתתף בתדריך הקב\"ט." }
                ],
                summary: "הנחיות משרד החינוך והביטחון ברורות מאוד לגבי הגדרת מלווים כדי להבטיח אחריותיות מקצועית."
            },
            { 
                id: 5, 
                type: 'multiple', 
                question: "מה המפתח של מלווים מבוגרים למשלחת עצמאית?", 
                options: [
                    { id: 'a', text: "א. במשלחת עצמאית נדרש מנהל משלחת מעל גיל 21 בעל הכשרה ותעודה בתוקף, וכן מלווה מבוגר אחד על כל 15 תלמידים.", correct: true },
                    { id: 'b', text: "ב. במשלחת עצמאית נדרש מנהל משלחת מעל גיל 21, וכן מלווה מבוגר אחד על כל 10 תלמידים." },
                    { id: 'c', text: "ג. במשלחת עצמאית נדרש מנהל משלחת ומלווה מבוגר אחד על כל 20 תלמידים." },
                    { id: 'd', text: "ד. במשלחת עצמאית נדרש מלווה מבוגר אחד על כל 15 תלמידים, ללא חובה למנהל משלחת." }
                ],
                summary: "חשוב להקפיד על יחס מלווים תקין כדי לאפשר שליטה וניהול אירועים בשטח במידת הצורך."
            }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [playerName, setPlayerName] = useState('');
            const [currentStep, setCurrentStep] = useState('login');
            const [questionIndex, setQuestionIndex] = useState(0);
            const [selectedOptions, setSelectedOptions] = useState([]);
            const [wordCloudInput, setWordCloudInput] = useState('');
            const [timeLeft, setTimeLeft] = useState(20);
            const [hasAnswered, setHasAnswered] = useState(false);
            const [lastResult, setLastResult] = useState(null);
            const [players, setPlayers] = useState([]);
            const [answers, setAnswers] = useState([]);
            const [dynamicQuestions, setDynamicQuestions] = useState(DEFAULT_QUESTIONS);
            const [adminPass, setAdminPass] = useState('');

            useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(u => { if (!u) auth.signInAnonymously(); setUser(u); });
                return unsubAuth;
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const unsubQ = path.collection('config').doc('questions').onSnapshot(s => { if (s.exists) setDynamicQuestions(s.data().list); });
                const unsubP = path.collection('players').onSnapshot(s => setPlayers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubA = path.collection('answers').onSnapshot(s => setAnswers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                return () => { unsubQ(); unsubP(); unsubA(); };
            }, [user]);

            useEffect(() => {
                let timer;
                if (currentStep === 'quiz' && timeLeft > 0 && !hasAnswered) {
                    timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (timeLeft === 0 && !hasAnswered && currentStep === 'quiz') {
                    submitAnswer();
                }
                return () => clearInterval(timer);
            }, [timeLeft, currentStep, hasAnswered]);

            const handleJoin = async () => {
                if (!playerName.trim()) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('players').doc(user.uid).set({name: playerName, score: 0});
                setCurrentStep('lobby');
            };

            const submitAnswer = async () => {
                if (hasAnswered) return;
                const q = dynamicQuestions[questionIndex];
                let isCorrect = false;

                if (q.type === 'wordcloud') {
                    isCorrect = true;
                } else if (q.type === 'multiple') {
                    isCorrect = selectedOptions[0] === q.options.find(o => o.correct)?.id;
                } else if (q.type === 'multiple_select') {
                    const correctIds = q.options.filter(o => o.correct).map(o => o.id).sort().join(',');
                    isCorrect = correctIds === [...selectedOptions].sort().join(',');
                }

                let points = 0;
                if (isCorrect && q.type !== 'wordcloud') {
                    points = Math.max(100 - (20 - timeLeft), 50);
                    const p = players.find(p => p.id === user.uid);
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('players').doc(user.uid).update({
                        score: (p?.score || 0) + points
                    });
                }

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('answers').add({
                    playerId: user.uid, playerName, questionId: q.id, 
                    answer: q.type === 'wordcloud' ? wordCloudInput : selectedOptions,
                    isCorrect, timestamp: Date.now()
                });

                setLastResult({ isCorrect, points, type: q.type });
                setHasAnswered(true);
                setCurrentStep('instant_feedback'); // שלב חדש: חיווי מיידי
            };

            const resetGame = async () => {
                if (!confirm("למחוק את כל נתוני המשחק?")) return;
                const path = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const pS = await path.collection('players').get();
                const aS = await path.collection('answers').get();
                const batch = db.batch();
                pS.forEach(d => batch.delete(d.ref));
                aS.forEach(d => batch.delete(d.ref));
                await batch.commit();
                alert("המשחק אופס!");
            };

            const leaderboard = useMemo(() => [...players].sort((a,b) => (b.score||0)-(a.score||0)).slice(0, 5), [players]);

            const wordCloudData = useMemo(() => {
                const qId = dynamicQuestions[questionIndex]?.id;
                const freq = {};
                answers.filter(a => a.questionId === qId).forEach(ans => {
                    if (typeof ans.answer === 'string') {
                        ans.answer.split(/[\s,.;]+/).forEach(w => {
                            const clean = w.trim();
                            if (clean.length > 1) freq[clean] = (freq[clean] || 0) + 1;
                        });
                    }
                });
                return Object.entries(freq).map(([text, value]) => ({ text, value })).sort((a,b) => b.value - a.value);
            }, [answers, questionIndex, dynamicQuestions]);

            return (
                <div className="min-h-screen flex flex-col items-center p-4">
                    <nav className="w-full max-w-4xl flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border mb-6">
                        <div className="font-black text-xl text-blue-600">🏆 תדריך משלחת</div>
                        {playerName && <div className="bg-blue-50 text-blue-700 px-4 py-1 rounded-full font-bold">{playerName}</div>}
                    </nav>

                    <main className="w-full max-w-2xl">
                        {currentStep === 'login' && (
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl border text-center animate-slide">
                                <h2 className="text-3xl font-black mb-6 tracking-tight">ברוכים הבאים</h2>
                                <input type="text" className="w-full p-5 rounded-2xl bg-slate-50 border-2 mb-4 text-center text-xl font-bold outline-none focus:border-blue-500" placeholder="מה השם שלך?" value={playerName} onChange={e => setPlayerName(e.target.value)} />
                                <button onClick={handleJoin} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg">הצטרפות</button>
                            </div>
                        )}

                        {currentStep === 'lobby' && (
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-xl border text-center animate-slide">
                                <h2 className="text-2xl font-black mb-8 text-slate-800">המשתתפים בחדר ({players.length})</h2>
                                <div className="grid grid-cols-2 gap-3 mb-10">
                                    {players.map(p => <div key={p.id} className="p-4 bg-slate-50 rounded-xl font-bold border truncate">{p.name}</div>)}
                                </div>
                                <button onClick={() => { setQuestionIndex(0); setTimeLeft(20); setHasAnswered(false); setCurrentStep('quiz'); }} className="bg-green-600 text-white px-12 py-5 rounded-2xl font-black text-xl shadow-lg">התחל חידון!</button>
                            </div>
                        )}

                        {currentStep === 'quiz' && dynamicQuestions[questionIndex] && (
                            <div className="space-y-6 animate-slide">
                                <div className="w-full bg-slate-200 h-3 rounded-full overflow-hidden shadow-inner">
                                    <div className="bg-blue-500 h-full timer-bar" style={{ width: `${(timeLeft / 20) * 100}%` }}></div>
                                </div>
                                <div className="text-center font-black text-3xl text-blue-600 mb-2">⏱️ {timeLeft}</div>
                                <div className="bg-white p-8 rounded-[2rem] shadow-lg border">
                                    <h2 className="text-2xl font-black leading-tight text-slate-800">{dynamicQuestions[questionIndex].question}</h2>
                                    {dynamicQuestions[questionIndex].hint && <div className="mt-2 text-indigo-600 font-bold bg-indigo-50 p-2 rounded-lg inline-block text-sm">💡 {dynamicQuestions[questionIndex].hint}</div>}
                                </div>
                                <div className="grid gap-3">
                                    {dynamicQuestions[questionIndex].type === 'wordcloud' ? (
                                        <div className="bg-white p-8 rounded-[2rem] border-2 text-center">
                                            <p className="text-slate-500 mb-4">{dynamicQuestions[questionIndex].description}</p>
                                            <input type="text" className="w-full p-4 rounded-xl bg-slate-50 border text-xl font-bold text-center mb-4" value={wordCloudInput} onChange={e => setWordCloudInput(e.target.value)} placeholder="כתבו כאן..." />
                                            <button onClick={submitAnswer} className="bg-blue-600 text-white py-4 px-10 rounded-xl font-black">שלח 🚀</button>
                                        </div>
                                    ) : (
                                        dynamicQuestions[questionIndex].options.map(opt => (
                                            <button key={opt.id} onClick={() => dynamicQuestions[questionIndex].type === 'multiple' ? setSelectedOptions([opt.id]) : setSelectedOptions(p => p.includes(opt.id) ? p.filter(x => x !== opt.id) : [...p, opt.id])} className={`p-6 rounded-2xl border-2 text-right font-bold transition-all ${selectedOptions.includes(opt.id) ? 'border-blue-500 bg-blue-50 shadow-md scale-[1.02]' : 'bg-white border-slate-100 hover:border-slate-300'}`}>{opt.text}</button>
                                        ))
                                    )}
                                </div>
                                {dynamicQuestions[questionIndex].type !== 'wordcloud' && <button onClick={submitAnswer} disabled={selectedOptions.length === 0} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg disabled:opacity-50">אישור ובדיקה</button>}
                            </div>
                        )}

                        {/* מסך חיווי מיידי - הפיצ'ר החדש */}
                        {currentStep === 'instant_feedback' && (
                            <div className="text-center mt-20 animate-pop">
                                {lastResult?.type === 'wordcloud' ? (
                                    <div className="bg-white p-16 rounded-[3rem] shadow-2xl border border-blue-100">
                                        <div className="text-8xl mb-8">💬</div>
                                        <h2 className="text-5xl font-black text-blue-600 mb-12">תודה על השיתוף!</h2>
                                        <button onClick={() => setCurrentStep('leaderboard')} className="bg-slate-900 text-white py-5 px-16 rounded-2xl text-xl font-bold">המשך לתוצאות המשלחת</button>
                                    </div>
                                ) : (
                                    <div className={`p-16 rounded-[3rem] shadow-2xl border ${lastResult?.isCorrect ? 'bg-white border-green-200' : 'bg-white border-red-200'}`}>
                                        <div className="text-9xl mb-8">{lastResult?.isCorrect ? "✅" : "❌"}</div>
                                        <h2 className={`text-6xl font-black mb-6 ${lastResult?.isCorrect ? 'text-green-600' : 'text-red-500'}`}>
                                            {lastResult?.isCorrect ? "נכון מאוד!" : "טעות..."}
                                        </h2>
                                        <p className="text-2xl text-slate-500 mb-12 font-bold">קיבלת {lastResult?.points || 0} נקודות</p>
                                        <button onClick={() => setCurrentStep('leaderboard')} className="bg-slate-900 text-white py-5 px-16 rounded-2xl text-xl font-bold shadow-xl">איפה אני בטבלה? 📊</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {currentStep === 'leaderboard' && (
                            <div className="space-y-6 animate-slide">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl border">
                                    <div className="flex justify-between items-center mb-8 border-b pb-4">
                                        <h2 className="text-2xl font-black flex items-center gap-2">🏆 מובילים כרגע</h2>
                                        <button onClick={() => setCurrentStep('feedback')} className="bg-blue-600 text-white py-2 px-6 rounded-xl font-bold text-sm shadow-md">לסיכום השאלה ➔</button>
                                    </div>
                                    <div className="space-y-3">
                                        {leaderboard.map((p, i) => (
                                            <div key={p.id} className={`flex justify-between p-5 rounded-2xl font-bold ${p.id === user.uid ? 'bg-blue-50 border-blue-200 border animate-pulse' : 'bg-slate-50'}`}>
                                                <span className="text-xl">{i+1}. {p.name}</span>
                                                <span className="text-blue-600 text-2xl">{p.score}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentStep === 'feedback' && (
                            <div className="text-center animate-slide bg-white p-8 rounded-[3rem] shadow-xl border overflow-hidden">
                                <h2 className="text-3xl font-black mb-8 text-blue-600 border-b pb-4">סיכום השאלה</h2>
                                
                                {dynamicQuestions[questionIndex].type !== 'wordcloud' && (
                                    <div className="mb-6 p-6 bg-green-50 rounded-2xl border border-green-100 text-right">
                                        <p className="text-green-800 font-bold mb-2 text-sm uppercase">התשובה הנכונה הייתה:</p>
                                        <p className="font-black text-xl leading-snug">{dynamicQuestions[questionIndex].options.filter(o => o.correct).map(o => o.text).join(', ')}</p>
                                    </div>
                                )}

                                <div className="mb-8 text-right bg-slate-50 p-6 rounded-2xl border">
                                    <p className="text-slate-400 font-bold text-xs mb-2 uppercase tracking-widest">משפט מסכם:</p>
                                    <p className="text-xl font-bold leading-relaxed text-slate-800">{dynamicQuestions[questionIndex].summary || "למידה משותפת מחזקת את המשלחת!"}</p>
                                </div>

                                <div className="mb-10 text-right">
                                    <p className="font-black mb-4 text-slate-400 border-b pb-2">פילוח תשובות המשלחת:</p>
                                    {dynamicQuestions[questionIndex].type === 'wordcloud' ? (
                                        <div className="flex flex-wrap gap-2 justify-center p-8 bg-blue-50 rounded-3xl border-2 border-dashed border-blue-200">
                                            {wordCloudData.map((w, i) => <span key={i} style={{ fontSize: `${1.2 + (w.value * 0.5)}rem` }} className="font-black text-blue-600 px-3">{w.text}</span>)}
                                            {wordCloudData.length === 0 && <p className="text-slate-400">מחכים לתשובות...</p>}
                                        </div>
                                    ) : (
                                        <div className="space-y-2">
                                            {dynamicQuestions[questionIndex].options.map(opt => {
                                                const count = answers.filter(a => a.questionId === dynamicQuestions[questionIndex].id && Array.isArray(a.answer) && a.answer.includes(opt.id)).length;
                                                return (
                                                    <div key={opt.id} className={`flex justify-between items-center p-4 rounded-xl border ${opt.correct ? 'bg-green-50 border-green-300' : 'bg-white border-slate-100'}`}>
                                                        <span className={`flex-1 text-right ml-4 ${opt.correct ? "font-black text-green-700" : "text-slate-600"}`}>{opt.text}</span>
                                                        <span className="bg-blue-600 text-white px-3 py-1 rounded-full font-black min-w-[45px] text-center shadow-sm">{count}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>

                                <button onClick={() => { 
                                    if (questionIndex < dynamicQuestions.length - 1) { 
                                        setQuestionIndex(i => i + 1); setSelectedOptions([]); setTimeLeft(20); setHasAnswered(false); setWordCloudInput(''); setCurrentStep('quiz'); 
                                    } else { setCurrentStep('results'); }
                                }} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-blue-700">המשך לשאלה הבאה</button>
                            </div>
                        )}

                        {currentStep === 'results' && (
                            <div className="text-center animate-slide">
                                <div className="text-8xl mb-6">🏆</div>
                                <h2 className="text-5xl font-black mb-10 text-slate-800">החידון הסתיים!</h2>
                                <div className="bg-white p-8 rounded-[3rem] shadow-2xl border mb-10">
                                    <h2 className="text-2xl font-black mb-8 border-b pb-4">טבלת המנצחים הסופית 👑</h2>
                                    {leaderboard.map((p, i) => (
                                        <div key={p.id} className={`flex justify-between p-6 mb-3 rounded-2xl font-black text-2xl transition-transform ${i === 0 ? 'bg-blue-600 text-white scale-105 shadow-2xl' : 'bg-slate-50'}`}>
                                            <span>{i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1) + '.'} {p.name}</span>
                                            <span>{p.score}</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => window.location.reload()} className="bg-slate-900 text-white py-6 px-20 rounded-2xl text-xl font-black shadow-2xl">משחק חדש 🔄</button>
                            </div>
                        )}

                        {currentStep === 'admin_panel' && (
                            <div className="space-y-6 animate-slide">
                                <div className="flex justify-between items-center bg-white p-6 rounded-3xl border sticky top-4 z-50 shadow-md">
                                    <h2 className="text-2xl font-black text-slate-800">ניהול מערכת ⚙️</h2>
                                    <div className="flex gap-2">
                                        <button onClick={resetGame} className="bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-600">איפוס משחק 🗑️</button>
                                        <button onClick={() => setCurrentStep('login')} className="bg-slate-200 px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-300">יציאה</button>
                                    </div>
                                </div>
                                {dynamicQuestions.map((q, qIdx) => (
                                    <div key={q.id} className="bg-white p-8 rounded-[2rem] shadow-lg border space-y-4 text-right">
                                        <div className="flex justify-between border-b pb-2">
                                            <span className="font-black text-blue-600 underline">שאלה {qIdx + 1}</span>
                                            <button onClick={() => { if(confirm("למחוק שאלה?")) setDynamicQuestions(dynamicQuestions.filter((_, i) => i !== qIdx)); }} className="text-red-400 text-xs font-bold">מחיקה</button>
                                        </div>
                                        <textarea className="w-full p-4 bg-slate-50 border-2 rounded-xl font-bold" value={q.question} onChange={e => { const n = [...dynamicQuestions]; n[qIdx].question = e.target.value; setDynamicQuestions(n); }} />
                                        <label className="block text-xs font-bold text-slate-400">משפט מסכם:</label>
                                        <textarea className="w-full p-4 bg-blue-50 border-2 rounded-xl" value={q.summary} onChange={e => { const n = [...dynamicQuestions]; n[qIdx].summary = e.target.value; setDynamicQuestions(n); }} />
                                        
                                        {q.type !== 'wordcloud' && (
                                            <div className="space-y-3 pt-4 border-t">
                                                {q.options.map((opt, oIdx) => (
                                                    <div key={opt.id} className="flex gap-2 items-center bg-slate-50 p-2 rounded-xl border">
                                                        <input type="text" className="flex-1 p-2 bg-white border rounded-lg text-sm font-bold outline-none" value={opt.text} onChange={e => { const n = [...dynamicQuestions]; n[qIdx].options[oIdx].text = e.target.value; setDynamicQuestions(n); }} />
                                                        <button onClick={() => { 
                                                            const n = [...dynamicQuestions]; 
                                                            if (q.type === 'multiple') n[qIdx].options.forEach(o => o.correct = false);
                                                            n[qIdx].options[oIdx].correct = !n[qIdx].options[oIdx].correct;
                                                            setDynamicQuestions(n);
                                                        }} className={`px-4 py-2 rounded-lg text-xs font-black ${opt.correct ? 'bg-green-600 text-white shadow-md' : 'bg-white text-slate-300 border'}`}>נכון</button>
                                                        <button onClick={() => { const n = [...dynamicQuestions]; n[qIdx].options = n[qIdx].options.filter((_, i) => i !== oIdx); setDynamicQuestions(n); }} className="text-red-300 px-2 font-bold">✕</button>
                                                    </div>
                                                ))}
                                                <button onClick={() => { const n = [...dynamicQuestions]; n[qIdx].options.push({ id: Math.random().toString(36).substr(2, 9), text: 'תשובה חדשה', correct: false }); setDynamicQuestions(n); }} className="bg-slate-100 text-slate-600 text-xs font-bold py-2 px-4 rounded-lg hover:bg-blue-100 transition-all">+ הוספת אפשרות</button>
                                            </div>
                                        )}
                                        <button onClick={() => { db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('questions').set({ list: dynamicQuestions }); alert("נשמר ב-Firebase!"); }} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg hover:bg-blue-700 transition-all">שמור שינויים 💾</button>
                                    </div>
                                ))}
                                <button onClick={() => setDynamicQuestions([...dynamicQuestions, { id: Date.now(), type: 'multiple', question: 'שאלה חדשה', options: [{id: 'a', text: 'תשובה 1', correct: true}], summary: '' }])} className="w-full py-8 border-4 border-dashed rounded-[2.5rem] text-slate-400 font-black">+ הוספת שאלה חדשה</button>
                            </div>
                        )}

                        {currentStep === 'admin_login' && (
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl border text-center max-w-sm mx-auto mt-20 animate-slide">
                                <h2 className="text-2xl font-black mb-6 tracking-tight">כניסת מנהלת ⚙️</h2>
                                <input type="password" placeholder="סיסמה" className="w-full p-4 rounded-xl border-2 mb-4 text-center font-black outline-none focus:border-blue-500 shadow-inner" value={adminPass} onChange={e => setAdminPass(e.target.value)} onKeyDown={e => e.key === 'Enter' && adminPass === '12345' && setCurrentStep('admin_panel')} autoFocus />
                                <button onClick={() => adminPass === '12345' ? setCurrentStep('admin_panel') : alert("סיסמה שגויה")} className="w-full bg-slate-900 text-white py-4 rounded-xl font-black">כניסה</button>
                            </div>
                        )}
                    </main>

                    <footer className="py-12 mt-auto">
                        <button onClick={() => setCurrentStep('admin_login')} className="text-slate-300 hover:text-blue-400 opacity-40 hover:opacity-100 text-xs font-bold transition-all flex items-center gap-1 uppercase tracking-tighter">⚙️ Admin Access</button>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
