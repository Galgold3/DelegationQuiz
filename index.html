<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק תדריך משלחת</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.2/umd/Recharts.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Heebo', sans-serif; margin: 0; padding: 0; }
        .animate-slide { animation: slide-up 0.4s ease-out both; }
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // פונקציה שמחכה שכל הספריות יהיו זמינות
        const initApp = () => {
            const { useState, useEffect, useMemo } = React;
            
            // הגנה: אם הספריות לא נטענו, נשתמש באובייקט ריק כדי למנוע קריסה
            const rechartsObj = window.Recharts || {};
            const lucideObj = window.lucideReact || window.Lucide || {};

            const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = rechartsObj;
            const { Users, Trophy, ChevronRight, Send, BarChart2, Award, Clock, CheckCircle2, XCircle, Settings, Save, Plus, Trash2, LogOut, MessageSquare } = lucideObj;

            // Firebase Config
            const firebaseConfig = {
                apiKey: "AIzaSyD6YyQzuKAFfujfE5y-gyMsvja4yZ_nlS4",
                authDomain: "delegationquizv.firebaseapp.com",
                projectId: "delegationquizv",
                storageBucket: "delegationquizv.firebasestorage.app",
                messagingSenderId: "80236670656",
                appId: "1:80236670656:web:632e8773af3bff79cc4725"
            };

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            const appId = 'delegation-quiz-v5';

            const QUESTIONS = [
                { id: 1, type: 'wordcloud', question: "מהם הדברים שיש לוודא טרם הגעה לתדריך למשלחת?", description: "כתבו מילה או שתיים שחשוב לבדוק מראש" },
                { id: 2, type: 'multiple', question: "היכן ניתן לראות את רמת האיום בכל מדינה?", options: [{ id: 'a', text: "א. באתר השגרירות" }, { id: 'b', text: "ב. מידע לא נגיש" }, { id: 'c', text: "ג. באתר המל\"ל", correct: true }, { id: 'd', text: "ד. בתקשורת" }] },
                { id: 3, type: 'multiple_select', question: "איזה משפט הכי נכון?", options: [{ id: 'a', text: "א. תדריך אחיד" }, { id: 'b', text: "ב. להפחיד" }, { id: 'c', text: "ג. מדויק למשלחת", correct: true }, { id: 'd', text: "ד. מערב משתתפים", correct: true }] }
            ];

            function App() {
                const [user, setUser] = useState(null);
                const [playerName, setPlayerName] = useState('');
                const [currentStep, setCurrentStep] = useState('login');
                const [players, setPlayers] = useState([]);

                useEffect(() => {
                    const unsub = auth.onAuthStateChanged(async (u) => {
                        if (!u) await auth.signInAnonymously();
                        setUser(u);
                    });
                    return unsub;
                }, []);

                useEffect(() => {
                    if (!user) return;
                    return db.collection('artifacts').doc(appId).collection('public').doc('data').collection('players')
                        .onSnapshot(s => setPlayers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                }, [user]);

                const handleJoin = async () => {
                    if (!playerName.trim()) return;
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('players').doc(user.uid).set({
                        name: playerName, score: 0, lastActive: Date.now()
                    });
                    setCurrentStep('lobby');
                };

                return (
                    <div className="min-h-screen flex flex-col items-center p-6" dir="rtl">
                        <nav className="w-full max-w-4xl flex justify-between items-center mb-10 bg-white p-4 rounded-2xl shadow-sm border">
                            <div className="flex items-center gap-2 font-black text-xl text-blue-600">
                                {Award && <Award />} <span>תדריך משלחת</span>
                            </div>
                            {playerName && <div className="font-bold text-slate-600">{playerName}</div>}
                        </nav>

                        <div className="w-full max-w-md animate-slide">
                            {currentStep === 'login' && (
                                <div className="bg-white p-8 rounded-[2rem] shadow-xl border text-center">
                                    {Users && <Users size={48} className="mx-auto text-blue-500 mb-4" />}
                                    <h2 className="text-3xl font-black mb-6">ברוכים הבאים</h2>
                                    <input 
                                        type="text" 
                                        className="w-full p-4 rounded-xl bg-slate-50 border-2 mb-4 text-center text-lg font-bold outline-none focus:border-blue-500" 
                                        placeholder="מה השם שלך?" 
                                        value={playerName} 
                                        onChange={e => setPlayerName(e.target.value)} 
                                    />
                                    <button onClick={handleJoin} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg shadow-lg">הצטרפות</button>
                                </div>
                            )}

                            {currentStep === 'lobby' && (
                                <div className="bg-white p-8 rounded-[2rem] shadow-xl border text-center">
                                    <h2 className="text-2xl font-black mb-6">ממתינים למתחילים...</h2>
                                    <div className="grid grid-cols-2 gap-2 mb-8">
                                        {players.map(p => <div key={p.id} className="p-3 bg-slate-50 rounded-lg font-bold border">{p.name}</div>)}
                                    </div>
                                    <p className="text-slate-500">כבר מתחילים!</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
            console.log("🚀 System Ready: App Rendered");
        };

        // הפעלה רק כשהחלון מוכן
        window.onload = initApp;
    </script>
</body>
</html>
