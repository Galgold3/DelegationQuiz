<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק תדריך משלחת</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #f8fafc; margin: 0; direction: rtl; }
        .animate-slide { animation: slide-up 0.4s ease-out both; }
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .timer-bar { transition: width 1s linear; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD6YyQzuKAFfujfE5y-gyMsvja4yZ_nlS4",
            authDomain: "delegationquizv.firebaseapp.com",
            projectId: "delegationquizv",
            storageBucket: "delegationquizv.firebasestorage.app",
            messagingSenderId: "80236670656",
            appId: "1:80236670656:web:632e8773af3bff79cc4725"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'delegation-quiz-v5';

        const DEFAULT_QUESTIONS = [
            { id: 1, type: 'wordcloud', question: "מהם הדברים שיש לוודא טרם הגעה לתדריך למשלחת?", summary: "הכנה מראש היא המפתח לתדריך אפקטיבי וביטחון המשלחת." },
            { id: 2, type: 'multiple', question: "היכן ניתן לראות את רמת האיום בכל מדינה?", options: [{ id: 'a', text: "באתר השגרירות" }, { id: 'c', text: "באתר המל\"ל", correct: true }], summary: "אתר המל\"ל הוא המקור הרשמי והמעודכן ביותר לרמות איום." },
            { id: 3, type: 'multiple_select', question: "איזה משפט הכי נכון?", options: [{ id: 'c', text: "מדויק למשלחת", correct: true }, { id: 'd', text: "מערב משתתפים", correct: true }], summary: "תדריך טוב הוא תדריך מותאם אישית שיוצר מעורבות של המשתתפים." }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [playerName, setPlayerName] = useState('');
            const [currentStep, setCurrentStep] = useState('login');
            const [questionIndex, setQuestionIndex] = useState(0);
            const [selectedOptions, setSelectedOptions] = useState([]);
            const [wordCloudInput, setWordCloudInput] = useState('');
            const [timeLeft, setTimeLeft] = useState(20);
            const [startTime, setStartTime] = useState(null);
            const [hasAnswered, setHasAnswered] = useState(false);
            const [players, setPlayers] = useState([]);
            const [answers, setAnswers] = useState([]);
            const [dynamicQuestions, setDynamicQuestions] = useState(DEFAULT_QUESTIONS);
            const [adminPass, setAdminPass] = useState('');

            // Auth & Sync
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => { if (!u) auth.signInAnonymously(); setUser(u); });
                return unsub;
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const unsubQ = path.collection('config').doc('questions').onSnapshot(s => { if (s.exists) setDynamicQuestions(s.data().list); });
                const unsubP = path.collection('players').onSnapshot(s => setPlayers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubA = path.collection('answers').onSnapshot(s => setAnswers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                return () => { unsubQ(); unsubP(); unsubA(); };
            }, [user]);

            // Timer Logic
            useEffect(() => {
                let timer;
                if (currentStep === 'quiz' && timeLeft > 0 && !hasAnswered) {
                    timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (timeLeft === 0 && !hasAnswered) {
                    submitAnswer();
                }
                return () => clearInterval(timer);
            }, [timeLeft, currentStep, hasAnswered]);

            const submitAnswer = async () => {
                if (hasAnswered) return;
                const timeTaken = 20 - timeLeft;
                const q = dynamicQuestions[questionIndex];
                let isCorrect = false;

                if (q.type === 'wordcloud') isCorrect = true;
                else if (q.type === 'multiple') isCorrect = selectedOptions[0] === q.options.find(o => o.correct)?.id;
                else if (q.type === 'multiple_select') {
                    const correctIds = q.options.filter(o => o.correct).map(o => o.id).sort().join(',');
                    isCorrect = correctIds === [...selectedOptions].sort().join(',');
                }

                if (isCorrect && q.type !== 'wordcloud') {
                    const points = Math.max(100 - timeTaken, 50);
                    const p = players.find(p => p.id === user.uid);
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('players').doc(user.uid).update({
                        score: (p?.score || 0) + points
                    });
                }

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('answers').add({
                    playerId: user.uid, playerName, questionId: q.id, answer: q.type === 'wordcloud' ? wordCloudInput : selectedOptions,
                    isCorrect, timestamp: Date.now()
                });

                setHasAnswered(true);
                setCurrentStep('feedback');
            };

            const resetGame = async () => {
                if (!confirm("בטוחה שאת רוצה למחוק את כל התוצאות והשחקנים?")) return;
                const path = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const playersSnapshot = await path.collection('players').get();
                const answersSnapshot = await path.collection('answers').get();
                const batch = db.batch();
                playersSnapshot.forEach(doc => batch.delete(doc.ref));
                answersSnapshot.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                alert("המשחק אופס!");
            };

            const leaderboard = useMemo(() => [...players].sort((a,b) => (b.score||0)-(a.score||0)).slice(0, 5), [players]);

            return (
                <div className="min-h-screen flex flex-col items-center p-4">
                    <nav className="w-full max-w-4xl flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border mb-6">
                        <div className="font-black text-xl text-blue-600">🏆 תדריך משלחת</div>
                        {playerName && <div className="bg-blue-50 text-blue-700 px-4 py-1 rounded-full font-bold">{playerName}</div>}
                    </nav>

                    <main className="w-full max-w-2xl">
                        {currentStep === 'login' && (
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl border text-center animate-slide">
                                <h2 className="text-3xl font-black mb-6 uppercase tracking-tight">כניסה למשחק</h2>
                                <input type="text" className="w-full p-5 rounded-2xl bg-slate-50 border-2 mb-4 text-center text-xl font-bold outline-none focus:border-blue-500" placeholder="מה השם שלך?" value={playerName} onChange={e => setPlayerName(e.target.value)} />
                                <button onClick={() => { if(playerName) { db.collection('artifacts').doc(appId).collection('public').doc('data').collection('players').doc(user.uid).set({name: playerName, score: 0}); setCurrentStep('lobby'); } }} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg">הצטרפות</button>
                            </div>
                        )}

                        {currentStep === 'lobby' && (
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-xl border text-center animate-slide">
                                <h2 className="text-2xl font-black mb-8">המשתתפים ({players.length})</h2>
                                <div className="grid grid-cols-2 gap-3 mb-10">
                                    {players.map(p => <div key={p.id} className="p-4 bg-slate-50 rounded-xl font-bold border truncate">{p.name}</div>)}
                                </div>
                                <button onClick={() => { setQuestionIndex(0); setTimeLeft(20); setHasAnswered(false); setCurrentStep('quiz'); }} className="bg-green-600 text-white px-12 py-5 rounded-2xl font-black text-xl shadow-lg">התחל!</button>
                            </div>
                        )}

                        {currentStep === 'quiz' && (
                            <div className="space-y-6 animate-slide">
                                <div className="w-full bg-slate-200 h-3 rounded-full overflow-hidden">
                                    <div className="bg-blue-500 h-full timer-bar" style={{ width: `${(timeLeft / 20) * 100}%` }}></div>
                                </div>
                                <div className="text-center font-black text-2xl text-blue-600">⏱️ {timeLeft} שניות</div>
                                
                                <div className="bg-white p-8 rounded-[2rem] shadow-lg border">
                                    <h2 className="text-2xl font-black leading-tight text-slate-800">{dynamicQuestions[questionIndex].question}</h2>
                                </div>

                                <div className="grid gap-3">
                                    {dynamicQuestions[questionIndex].type === 'wordcloud' ? (
                                        <div className="bg-white p-8 rounded-[2rem] border-2 text-center">
                                            <input type="text" className="w-full p-4 rounded-xl bg-slate-50 border text-xl font-bold text-center mb-4" value={wordCloudInput} onChange={e => setWordCloudInput(e.target.value)} placeholder="הקלידו תשובה..." />
                                            <button onClick={submitAnswer} className="bg-blue-600 text-white py-4 px-10 rounded-xl font-black">שלח</button>
                                        </div>
                                    ) : (
                                        dynamicQuestions[questionIndex].options.map(opt => (
                                            <button key={opt.id} onClick={() => dynamicQuestions[questionIndex].type === 'multiple' ? setSelectedOptions([opt.id]) : setSelectedOptions(p => p.includes(opt.id) ? p.filter(x => x !== opt.id) : [...p, opt.id])} className={`p-6 rounded-2xl border-2 text-right font-bold transition-all ${selectedOptions.includes(opt.id) ? 'border-blue-500 bg-blue-50' : 'bg-white border-slate-100'}`}>{opt.text}</button>
                                        ))
                                    )}
                                </div>
                                {dynamicQuestions[questionIndex].type !== 'wordcloud' && <button onClick={submitAnswer} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg">אישור</button>}
                            </div>
                        )}

                        {currentStep === 'feedback' && (
                            <div className="text-center mt-12 animate-slide bg-white p-10 rounded-[3rem] shadow-xl border">
                                <h2 className="text-4xl font-black mb-6 text-blue-600">סיכום שאלה</h2>
                                
                                {dynamicQuestions[questionIndex].type !== 'wordcloud' && (
                                    <div className="mb-8 p-6 bg-green-50 rounded-2xl border border-green-100">
                                        <p className="text-green-800 font-bold text-xl">התשובה הנכונה:</p>
                                        <p className="text-2xl font-black">{dynamicQuestions[questionIndex].options.filter(o => o.correct).map(o => o.text).join(', ')}</p>
                                    </div>
                                )}

                                <div className="mb-10 text-right">
                                    <p className="text-slate-400 font-bold mb-2">משפט מסכם:</p>
                                    <p className="text-xl font-bold leading-relaxed">{dynamicQuestions[questionIndex].summary || "אין משפט מסכם לשאלה זו."}</p>
                                </div>

                                <button onClick={() => setCurrentStep('leaderboard')} className="bg-slate-900 text-white py-5 px-16 rounded-2xl text-xl font-bold">איך המשלחת ענתה? 📊</button>
                            </div>
                        )}

                        {currentStep === 'leaderboard' && (
                            <div className="space-y-8 animate-slide">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl border">
                                    <h2 className="text-2xl font-black mb-6 flex justify-between">🏆 5 המובילים <button onClick={() => { if (questionIndex < dynamicQuestions.length - 1) { setQuestionIndex(i => i + 1); setSelectedOptions([]); setTimeLeft(20); setHasAnswered(false); setWordCloudInput(''); setCurrentStep('quiz'); } else setCurrentStep('results'); }} className="text-blue-600 text-sm">המשך לשאלה הבאה ➔</button></h2>
                                    {leaderboard.map((p, i) => <div key={p.id} className="flex justify-between p-4 mb-2 bg-slate-50 rounded-xl font-bold"><span>{i+1}. {p.name}</span><span className="text-blue-600">{p.score}</span></div>)}
                                </div>
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border text-right">
                                    <h3 className="font-bold text-xl mb-6">פילוח תשובות המשלחת:</h3>
                                    {dynamicQuestions[questionIndex].options?.map(opt => {
                                        const count = answers.filter(a => a.questionId === dynamicQuestions[questionIndex].id && Array.isArray(a.answer) && a.answer.includes(opt.id)).length;
                                        return (
                                            <div key={opt.id} className="mb-4 flex justify-between items-center p-4 bg-slate-50 rounded-xl border">
                                                <span className={opt.correct ? "text-green-600 font-black" : "font-bold"}>{opt.text}</span>
                                                <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-black">{count} ענו</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {currentStep === 'results' && (
                            <div className="text-center mt-10 animate-slide">
                                <div className="text-7xl mb-6">👑</div>
                                <h2 className="text-5xl font-black mb-8">החידון הסתיים!</h2>
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl border mb-10">
                                    <h2 className="text-2xl font-black mb-6">🏆 טבלת המנצחים</h2>
                                    {leaderboard.map((p, i) => <div key={p.id} className="flex justify-between p-5 mb-2 bg-slate-50 rounded-2xl font-black text-xl"><span>{i+1}. {p.name}</span><span className="text-blue-600">{p.score}</span></div>)}
                                </div>
                                <button onClick={() => window.location.reload()} className="bg-slate-900 text-white py-6 px-20 rounded-2xl text-xl font-black shadow-2xl">משחק חדש</button>
                            </div>
                        )}

                        {currentStep === 'admin_login' && (
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl border text-center max-w-sm mx-auto mt-20">
                                <h2 className="text-2xl font-black mb-6">ניהול ⚙️</h2>
                                <input type="password" placeholder="סיסמה" className="w-full p-4 rounded-xl border-2 mb-4 text-center" value={adminPass} onChange={e => setAdminPass(e.target.value)} onKeyDown={e => e.key === 'Enter' && adminPass === '12345' && setCurrentStep('admin_panel')} autoFocus />
                            </div>
                        )}

                        {currentStep === 'admin_panel' && (
                            <div className="space-y-6 animate-slide">
                                <div className="flex justify-between items-center bg-white p-6 rounded-3xl border">
                                    <h2 className="text-2xl font-black">ניהול שאלות ⚙️</h2>
                                    <button onClick={resetGame} className="bg-red-500 text-white px-4 py-2 rounded-xl font-bold">מחיקת כל התוצאות 🗑️</button>
                                </div>
                                {dynamicQuestions.map((q, qIdx) => (
                                    <div key={q.id} className="bg-white p-6 rounded-[2rem] shadow border space-y-4">
                                        <label className="font-bold">שאלה:</label>
                                        <textarea className="w-full p-3 bg-slate-50 rounded-xl" value={q.question} onChange={e => { const n = [...dynamicQuestions]; n[qIdx].question = e.target.value; setDynamicQuestions(n); }} />
                                        <label className="font-bold">משפט מסכם:</label>
                                        <textarea className="w-full p-3 bg-blue-50 rounded-xl" value={q.summary} onChange={e => { const n = [...dynamicQuestions]; n[qIdx].summary = e.target.value; setDynamicQuestions(n); }} />
                                        <button onClick={() => { db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('questions').set({ list: dynamicQuestions }); alert("נשמר!"); }} className="bg-blue-600 text-white py-3 w-full rounded-xl font-black">שמור שינויים</button>
                                    </div>
                                ))}
                                <button onClick={() => setCurrentStep('login')} className="w-full bg-slate-200 py-4 rounded-xl font-bold">חזרה למשחק</button>
                            </div>
                        )}
                    </main>

                    <footer className="py-10">
                        <button onClick={() => setCurrentStep('admin_login')} className="text-slate-300 text-xs opacity-50 hover:opacity-100">⚙️ ניהול</button>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
